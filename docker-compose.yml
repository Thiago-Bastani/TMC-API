services:

  ############################################################
  # Supabase — PostgreSQL
  ############################################################
  db:
    image: supabase/postgres:15.8.1.060
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
      - ./supabase/db/init:/docker-entrypoint-initdb.d
    networks:
      - tmc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  ############################################################
  # Supabase — PostgREST
  ############################################################
  rest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    networks:
      - tmc-network

  ############################################################
  # Supabase — Realtime
  ############################################################
  realtime:
    image: supabase/realtime:v2.30.34
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: ${REALTIME_ENC_KEY}
      SECRET_KEY_BASE: ${REALTIME_SECRET}
      ERL_AFLAGS: -proto_dist inet_tcp
      SECURE_CHANNELS: "false"
      REPLICATION_MODE: RLS
      REPLICATION_POLL_INTERVAL: 100
      JWT_SECRET: ${JWT_SECRET}
      MAX_REPLICATION_LAG_MB: 0
      RLIMIT_NOFILE: "4096"
      APP_NAME: realtime
    networks:
      - tmc-network

  ############################################################
  # Supabase — Meta (Postgres metadata)
  ############################################################
  meta:
    image: supabase/postgres-meta:v0.83.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - tmc-network

  ############################################################
  # Supabase — Kong (API Gateway — Realtime WebSocket)
  ############################################################
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./supabase/kong.yml:/var/lib/kong/kong.yml:ro
    expose:
      - "8000"
    networks:
      - tmc-network

  ############################################################
  # Laravel — PHP-FPM
  ############################################################
  app:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      FILESYSTEM_DISK: public
      SESSION_DRIVER: file
      CACHE_STORE: file
    volumes:
      - laravel-storage:/var/www/html/storage
    networks:
      - tmc-network

  ############################################################
  # Nginx
  ############################################################
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    expose:
      - "80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./laravel/public:/var/www/html/public:ro
      - laravel-storage:/var/www/html/storage:ro
    networks:
      - tmc-network

volumes:
  supabase-db-data:
  laravel-storage:

networks:
  tmc-network:
    driver: bridge
